<!DOCTYPE html>
<html>
<head>
    <title>Available Items</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f5f7fa, #c3cfe2);
            margin: 0;
            padding: 40px;
        }

        h2 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 30px;
        }

        .items-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            max-width: 1000px;
            margin: auto;
        }

        .item-card {
            background-color: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            text-align: center;
            transition: transform 0.2s ease;
        }

        .item-card:hover {
            transform: scale(1.03);
        }

        .item-name {
            font-size: 18px;
            font-weight: bold;
            color: #34495e;
            margin-bottom: 10px;
        }

        .add-to-cart {
            display: inline-block;
            padding: 8px 16px;
            background-color: #27ae60;
            color: white;
            border-radius: 6px;
            text-decoration: none;
            transition: background-color 0.3s ease;
        }

        .add-to-cart:hover {
            background-color: #219150;
        }

        .cart-link {
            display: block;
            text-align: center;
            margin-top: 40px;
        }

        .cart-button {
            background-color: #2980b9;
            color: white;
            padding: 12px 24px;
            text-decoration: none;
            border-radius: 8px;
            font-size: 16px;
        }

        .cart-button:hover {
            background-color: #1f6391;
        }
    </style>
</head>
<body>
    <h2>Welcome, {{ username }}</h2>

    <div class="items-container">
        {% for item in items %}
        <div class="item-card">
            <div class="item-name">{{ item }}</div>
            <a href="{% url 'add_to_cart' item=item %}" class="add-to-cart">Add to Cart</a>
        </div>
        {% endfor %}
    </div>

    <div class="cart-link">
        <a href="{% url 'cart' %}" class="cart-button">Go to Cart 🛒</a>
    </div>
</body>
</html>
