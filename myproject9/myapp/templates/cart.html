<!DOCTYPE html>
<html>
<head>
    <title>Your Cart</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(145deg, #e3ffe7, #d9e7ff);
            margin: 0;
            padding: 40px;
        }

        h2 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 30px;
        }

        .cart-container {
            max-width: 600px;
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 6px 14px rgba(0, 0, 0, 0.1);
        }

        .cart-list {
            list-style-type: none;
            padding: 0;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #f6f6f6;
            margin-bottom: 12px;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 16px;
            color: #34495e;
        }

        .remove-button {
            background-color: #e74c3c;
            color: white;
            padding: 6px 12px;
            text-decoration: none;
            border-radius: 6px;
            font-size: 14px;
            transition: background-color 0.3s ease;
        }

        .remove-button:hover {
            background-color: #c0392b;
        }

        .empty-message {
            text-align: center;
            font-size: 18px;
            color: #888;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 30px;
        }

        .back-button {
            background-color: #2980b9;
            color: white;
            padding: 12px 24px;
            text-decoration: none;
            border-radius: 8px;
            font-size: 16px;
        }

        .back-button:hover {
            background-color: #1f6391;
        }
    </style>
</head>
<body>
    <h2>{{ username }}'s Cart</h2>

    <div class="cart-container">
        {% if cart %}
            <ul class="cart-list">
                {% for item in cart %}
                    <li class="cart-item">
                        {{ item }}
                        <a href="{% url 'remove_from_cart' item=item %}" class="remove-button">Remove</a>
                    </li>
                {% endfor %}
            </ul>
        {% else %}
            <p class="empty-message">Your cart is empty.</p>
        {% endif %}
    </div>

    <div class="back-link">
        <a href="{% url 'items' %}" class="back-button">← Back to Items</a>
    </div>
</body>
</html>
