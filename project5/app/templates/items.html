<!DOCTYPE html>
<html>
<head>
    <title>Available Items</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(to right, #617498, #6078a0);
            color: #ffffff;
            padding: 50px 20px;
            min-height: 100vh;
        }

        h2 {
            text-align: center;
            font-size: 36px;
            margin-bottom: 40px;
            font-weight: 600;
            text-shadow: 1px 1px 4px rgba(0, 0, 0, 0.3);
        }

        .items-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 25px;
            max-width: 1100px;
            margin: auto;
        }

        .item-card {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 25px;
            backdrop-filter: blur(12px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s ease, background-color 0.3s ease;
            text-align: center;
        }

        .item-card:hover {
            transform: translateY(-5px);
            background-color: rgba(255, 255, 255, 0.15);
        }

        .item-name {
            font-size: 20px;
            font-weight: 500;
            margin-bottom: 15px;
            color: #f8f9fa;
        }

        .add-to-cart {
            display: inline-block;
            padding: 10px 18px;
            background-color: #00cec9;
            color: #161010;
            border-radius: 30px;
            text-decoration: none;
            font-size: 15px;
            transition: background-color 0.3s ease;
        }

        .add-to-cart:hover {
            background-color: #edf0f0;
        }

        .cart-link {
            text-align: center;
            margin-top: 50px;
        }

        .cart-button {
            background-color: #bcad5a;
            color: #fff;
            padding: 14px 28px;
            border-radius: 30px;
            font-size: 16px;
            text-decoration: none;
            transition: background-color 0.3s ease;
        }

        .cart-button:hover {
            background-color: #635b93;
        }

        @media (max-width: 500px) {
            .item-card {
                padding: 20px 15px;
            }

            .item-name {
                font-size: 18px;
            }

            .add-to-cart,
            .cart-button {
                font-size: 14px;
                padding: 10px 20px;
            }
        }
    </style>
</head>
<body>
    <h2>Welcome, {{ username }}</h2>

    <div class="items-container">
        {% for item in items %}
        <div class="item-card">
            <div class="item-name">{{ item }}</div>
            <a href="{% url 'add_to_cart' item=item %}" class="add-to-cart">Add to Cart</a>
        </div>
        {% endfor %}
    </div>

    <div class="cart-link">
        <a href="{% url 'cart' %}" class="cart-button">View {{ username }}'s Cart</a>
    </div>
</body>
</html>
