<!DOCTYPE html>
<html>
<head>
    <title>Your Cart</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: #f9fafb;
            color: #2c3e50;
            padding: 40px 20px;
        }

        h2 {
            text-align: center;
            font-size: 32px;
            color: #1a202c;
            margin-bottom: 40px;
        }

        .cart-container {
            max-width: 700px;
            margin: 0 auto;
            background-color: #ffffff;
            padding: 30px;
            border-radius: 14px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.06);
        }

        .cart-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 20px;
            margin-bottom: 15px;
            background-color: #f3f4f6;
            border-radius: 10px;
            transition: transform 0.2s ease;
        }

        .cart-item:hover {
            transform: scale(1.01);
        }

        .item-name {
            font-size: 18px;
            font-weight: 500;
        }

        .remove-button {
            background-color: #ef4444;
            color: white;
            padding: 8px 14px;
            border: none;
            border-radius: 6px;
            text-decoration: none;
            font-size: 14px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        .remove-button:hover {
            background-color: #dc2626;
        }

        .empty-message {
            text-align: center;
            font-size: 20px;
            color: #6b7280;
            padding: 40px 0;
        }

        .back-link {
            text-align: center;
            margin-top: 40px;
        }

        .back-button {
            background-color: #3b82f6;
            color: white;
            padding: 12px 28px;
            font-size: 16px;
            text-decoration: none;
            border-radius: 10px;
            transition: background-color 0.3s ease;
        }

        .back-button:hover {
            background-color: #2563eb;
        }
    </style>
</head>
<body>
    <h2>{{ username }}'s Cart</h2>

    <div class="cart-container">
        {% if cart %}
            <ul class="cart-list">
                {% for item in cart %}
                    <li class="cart-item">
                        <span class="item-name">{{ item }}</span>
                        <a href="{% url 'remove_from_cart' item=item %}" class="remove-button">Remove</a>
                    </li>
                {% endfor %}
            </ul>
        {% else %}
            <p class="empty-message">No Items added to cart</p>
        {% endif %}
    </div>

    <div class="back-link">
        <a href="{% url 'items' %}" class="back-button">View all Items available</a>
    </div>
</body>
</html>
