<!DOCTYPE html>
<html lang="en">
<head>
    
    {% load static %}  <!-- Move this to the first line inside <head> -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech Reviews</title>
    <link rel="stylesheet" type="text/css" href="{% static 'styles.css' %}">
</head>
<body>
    <header class="main-header">
        <div class="overlay">
            <h1 class="title">
                <a href="{% url 'review_list' %}">Tech Reviews & Tutorials</a>
            </h1>
            <p class="subtitle"><b><marquee  direction="right">Your Ultimate Guide to the Latest Tech Trends and Tutorials</marquee></b></b></p>
        </div>
    </header>
    <div class="container">
        <img src=https://www.bing.com/th/id/OIP.3kgjLFHw8mHzLk3EtuHrKQHaGs?w=228&h=211&c=8&rs=1&qlt=90&o=6&dpr=1.3&pid=3.1&rm=2 alt="Tech Review" class="center-img">
        <h1><a href="{% url 'review_list' %}">Tech Reviews & Tutorials</a></h1>
        {% block content %}{% endblock %}
    </div>
</body>
</html>
